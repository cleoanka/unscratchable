name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: syntax-check every module (no build step, so this is the "lint")
        run: git ls-files '*.js' | xargs -n1 node --check
      - name: property tests (thousands of seeded random corruptions)
        run: node --test
